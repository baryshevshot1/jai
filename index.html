<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis AI</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="side-top">
          <button type="button" class="newchat" id="new-chat-btn">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
            Новый диалог
          </button>
        </div>

        <div class="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
          <input id="conv-search" placeholder="Поиск по диалогам" />
        </div>

        <div class="conv-list" id="conv-list"></div>

        <div class="side-foot">
          <div class="hwchip" id="hw-bar" hidden>
            <span class="led"></span>
            <span id="hw-text"></span>
          </div>
          <div class="side-actions">
            <button type="button" class="sbtn" id="check-btn" title="Проверить движок и железо">
              <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></svg>
              Проверка
            </button>
            <button type="button" class="sbtn" id="settings-btn" title="Настройки">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
              Настройки
            </button>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <span class="brand">Jarvis AI</span>
          <select class="model-pick" id="model-select" aria-label="Выбор модели"></select>
          <div class="spacer"></div>
          <div class="engine" id="engine">
            <span class="led"></span>
            <span id="status">проверка движка…</span>
          </div>
          <button type="button" class="iconbtn" id="refresh-btn" title="Обновить список моделей" aria-label="Обновить">
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8" /><path d="M21 3v5h-5" /></svg>
          </button>
          <div class="divider-v"></div>
          <button type="button" class="iconbtn" id="theme-btn" title="Сменить тему" aria-label="Сменить тему">
            <svg id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" /></svg>
          </button>
        </div>

        <div class="feed" id="feed">
          <div class="thread" id="messages"></div>
        </div>

        <form class="composer-wrap" id="chat-form">
          <div class="composer">
            <textarea id="chat-input" rows="1" placeholder="Спросите что-нибудь…"></textarea>
            <div class="composer-bar">
              <button type="button" class="tool" disabled title="Прикрепить документ — скоро">
                <svg viewBox="0 0 24 24"><path d="M21.4 11.05 12.2 20.3a5 5 0 0 1-7.1-7.1l9.2-9.2a3.3 3.3 0 0 1 4.7 4.7l-9.2 9.2a1.7 1.7 0 0 1-2.4-2.4l8.5-8.5" /></svg>
              </button>
              <button type="button" class="tool" disabled title="Изображение — скоро">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-5-5L5 21" /></svg>
              </button>
              <button type="button" class="think-toggle" id="think-toggle" title="Режим рассуждений модели (медленнее, но точнее)">
                <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-4 12.7V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.3A7 7 0 0 0 12 2z" /><path d="M9 21h6" /></svg>
                Размышления
              </button>
              <button type="submit" class="send" id="send-btn" title="Отправить">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7" /></svg>
              </button>
              <button type="button" class="send send--stop" id="stop-btn" hidden title="Остановить">
                <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
              </button>
            </div>
          </div>
          <div class="hint">Jarvis AI работает офлайн на вашем компьютере · Enter — отправить, Shift+Enter — перенос</div>
        </form>
      </main>
    </div>
  </body>
</html>
