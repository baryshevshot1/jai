<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jai</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="chat">
      <header class="chat__header">
        <span class="chat__title">jai</span>
        <span class="chat__status" id="status">проверка движка…</span>
        <button
          type="button"
          class="chat__refresh"
          id="refresh-btn"
          title="Обновить список моделей"
          aria-label="Обновить список моделей"
        >↻</button>
        <select class="chat__model" id="model-select" aria-label="Выбор модели"></select>
      </header>

      <div class="chat__hw" id="hw-bar" hidden></div>

      <div class="chat__messages" id="messages"></div>

      <form class="chat__inputbar" id="chat-form">
        <textarea
          id="chat-input"
          class="chat__input"
          rows="1"
          placeholder="Спросите что-нибудь…  (Enter — отправить, Shift+Enter — перенос строки)"
        ></textarea>
        <button type="submit" id="send-btn" class="chat__send">Отправить</button>
        <button type="button" id="stop-btn" class="chat__stop" hidden>Стоп</button>
      </form>
    </main>
  </body>
</html>
